baseURL: "http://www.yunan.io/"
title: "@yunan.wang"
paginate: 8
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

#googleAnalytics: UA-123-45

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: "@yunan.wang"
  description: "an Internet shelter"
  keywords: [Blog, Portfolio, Minimalist, Sustainability, Programming]
  author: minty
  images: "/avatar.jpg"
  DateFormat: "02/01/2006"
  defaultTheme: light
  disableThemeToggle: true

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: true
  comments: false
  hidemeta: true
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/apple-touch-icon.png"

  label:
    text: "Yunan's Home"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: true # needs to be explicitly set
    title: "@yunan.wang"
    subtitle: "
      a **Minimalist**, \n

      a **Sustainability** advocate, \n

      and an Amateur **programmer** \n"
    imageUrl: "/avatar.jpg"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "avatar"

  socialIcons:
    - name: email
      url: "mailto:contact@yunan.io"
    - name: linkedin
      url: "https://linkedin.com/yunanwg"
    - name: github
      url: "https://githun.com/mintyfrankie"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: about
      name: About
      url: "/about"
      weight: 10  

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
